@keyframes twk{0%,100%{opacity:.6}50%{opacity:.05}}

@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes pgi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes bth{0%,100%{border-color:rgba(138,104,32,.28)}50%{border-color:rgba(212,168,32,.65)}}
@keyframes mng{0%,100%{filter:drop-shadow(0 0 8px rgba(200,220,255,.38))}50%{filter:drop-shadow(0 0 22px rgba(200,220,255,.8))}}
@keyframes spn{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes sun{0%,100%{filter:drop-shadow(0 0 8px rgba(255,200,60,.5))}50%{filter:drop-shadow(0 0 22px rgba(255,200,60,.9))}}
@keyframes imgz{from{transform:scale(1.08)}to{transform:scale(1)}}
@keyframes prl{from{transform:scale(1.15) translateY(-5%)}to{transform:scale(1.15) translateY(2%)}}

.dc-in{animation:pgi .4s ease forwards}
.dc-float{animation:flt 4s ease-in-out infinite}
.dc-nav{transition:background .2s,color .2s,border-left-color .2s;cursor:pointer}
.dc-nav:hover{background:rgba(212,168,32,.09)!important;color:var(--goldb)!important}
.dc-nav.active{background:rgba(212,168,32,.14)!important;color:var(--goldb)!important;border-left-color:var(--gold)!important}
.dc-btn{transition:all .22s ease;cursor:pointer;border:none;font-family:inherit}
.dc-btn:hover{filter:brightness(1.14);transform:translateY(-1px)}
.dc-card{transition:transform .28s ease,box-shadow .28s ease}
.dc-card:hover{transform:translateY(-4px);box-shadow:0 14px 44px rgba(0,0,0,.65)!important}
.ph-zoom{overflow:hidden;position:relative}
.ph-zoom img{display:block;width:100%;height:100%;object-fit:cover;transition:transform 6s ease}
.ph-zoom:hover img{transform:scale(1.07)}
.oc-scene{perspective:1200px}
.oc-inner{position:relative;transform-style:preserve-3d;transition:transform .78s cubic-bezier(.4,0,.2,1);width:100%;height:100%}
.oc-inner.flipped{transform:rotateY(180deg)}
.oc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;overflow:hidden}
.oc-rev{transform:rotateY(180deg)}
textarea,input[type=text]{background:rgba(3,8,3,.92)!important;color:var(--parch)!important;border:1px solid rgba(138,104,32,.35)!important;font-family:'IM Fell English',serif!important;transition:border-color .3s,box-shadow .3s;outline:none}
textarea:focus,input[type=text]:focus{border-color:var(--gold)!important;box-shadow:0 0 18px rgba(212,168,32,.2)!important}
textarea::placeholder,input::placeholder{color:rgba(200,168,112,.26)!important;font-style:italic}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--f0)}
::-webkit-scrollbar-thumb{background:#3a3010;border-radius:3px}

/* ── Moon & Sun ── */
function getMoonPhase(d=new Date()){const r=new Date(Date.UTC(2000,0,6,18,14));const dy=(d-r)/86400000;const c=29.53058867;return((dy%c)+c)%c/c;}
function moonInfo(p){
  if(p<.063)return{e:'🌑',n:'New Moon',t:'Set intentions in the dark. The seed dreams beneath.'};
  if(p<.188)return{e:'🌒',n:'Waxing Crescent',t:'Something stirs. Follow the first green shoot.'};
  if(p<.313)return{e:'🌓',n:'First Quarter',t:'Choose a direction and walk toward it.'};
  if(p<.438)return{e:'🌔',n:'Waxing Gibbous',t:'The work deepens. Stay close to what is growing.'};
  if(p<.563)return{e:'🌕',n:'Full Moon',t:'Everything is illuminated. Honor what you see.'};
  if(p<.688)return{e:'🌖',n:'Waning Gibbous',t:'Share what the fullness revealed in you.'};
  if(p<.813)return{e:'🌗',n:'Last Quarter',t:'Release what is no longer yours to carry.'};
  return{e:'🌘',n:'Waning Crescent',t:'Rest. Prepare the ground for the next cycle.'};
}
function sunSign(d=new Date()){
  const m=d.getMonth()+1,dy=d.getDate();
  if((m===3&&dy>=21)||(m===4&&dy<=19))return{s:'Aries ♈',e:'🔥',t:'Begin before you are ready. First movement is sacred.'};
  if((m===4&&dy>=20)||(m===5&&dy<=20))return{s:'Taurus ♉',e:'🌍',t:'Root into what feeds you. Slow is not behind.'};
  if((m===5&&dy>=21)||(m===6&&dy<=20))return{s:'Gemini ♊',e:'🌬️',t:'Listen harder. The answer speaks in two voices.'};
  if((m===6&&dy>=21)||(m===7&&dy<=22))return{s:'Cancer ♋',e:'💧',t:'Return to what you love. Memory is medicine.'};
  if((m===7&&dy>=23)||(m===8&&dy<=22))return{s:'Leo ♌',e:'☀️',t:'Be seen fully. Withholding your light helps no one.'};
  if((m===8&&dy>=23)||(m===9&&dy<=22))return{s:'Virgo ♍',e:'🌾',t:'Tend the details. What you care for, thrives.'};
  if((m===9&&dy>=23)||(m===10&&dy<=22))return{s:'Libra ♎',e:'⚖️',t:'Find the still point between the opposites.'};
  if((m===10&&dy>=23)||(m===11&&dy<=21))return{s:'Scorpio ♏',e:'🌑',t:'Descend without fear. What is hidden, transforms.'};
  if((m===11&&dy>=22)||(m===12&&dy<=21))return{s:'Sagittarius ♐',e:'🏹',t:'Aim at what is true. Distance is not distance.'};
  if((m===12&&dy>=22)||(m===1&&dy<=19))return{s:'Capricorn ♑',e:'🏔️',t:'Climb steadily. The mountain has always known you.'};
  if((m===1&&dy>=20)||(m===2&&dy<=18))return{s:'Aquarius ♒',e:'⚡',t:'What you carry, you carry for everyone.'};
  return{s:'Pisces ♓',e:'🌊',t:'Dissolve the boundary. The sea already knows the way.'};
}
function getDailyCard(cards){const d=new Date();const doy=Math.floor((d-new Date(d.getFullYear(),0,0))/86400000);return cards[(d.getFullYear()*365+doy)%cards.length];}

const OCATS=[

const CARDS=[
  {id:1,cat:'moon',e:'🌑',title:'The New Moon Speaks',w:'In the dark of the moon, seeds dream of sunlight. Do not mistake the absence of light for the absence of life. Rest in the fertile dark — something sacred is being prepared in the silence of not-yet.',r:'What are you carrying beneath the surface, not yet ready to be seen?'},
  {id:2,cat:'moon',e:'🌕',title:'The Full Moon Reveals',w:'The full moon hides nothing. It illuminates everything — the beautiful and the raw alike. What is true becomes impossible to deny on these nights. This is not a threat. It is a gift wrapped in silver.',r:'What truth has been circling you, waiting until you were ready to hold it?'},
  {id:3,cat:'moon',e:'🌘',title:'The Waning Teaches Release',w:"What has served its purpose? The waning moon teaches the courage of release — not loss, but the sacred act of making space. What the moon lets go becomes the dark that holds the next seed.",r:'What are you holding past its time?'},
  {id:4,cat:'moon',e:'⭐',title:'The Stars Remember',w:"The light you see from the stars left its source long before you were born. You stand in a river of ancient time each night you look up. The ancestors are not behind you — they burn above you, still.",r:"Which of your ancestors' stories live in your body, waiting to be honored?"},
  {id:5,cat:'forest',e:'🌳',title:"The Oak's Ring",w:"The oak grows one ring at a time, never hurrying its strength. Roots go as deep as the tree is tall — what you cannot see equals what you can. Endurance is devotion.",r:'Where are you being called to trust the slow, ring-by-ring unfolding?'},
  {id:6,cat:'forest',e:'🌿',title:'The Birch Begins',w:"The birch is always first to move into disturbed ground. After fire, after clearing, after ruin — the birch comes first. It does not wait for perfect conditions.",r:'What new growth is trying to move through you?'},
  {id:7,cat:'forest',e:'🌑',title:"The Yew's Door",w:"The yew lives a thousand years, dies at its heartwood, and grows new trunks from the old. Death and rebirth are not opposites — they are the same door, entered from different sides.",r:'What part of you is dying so that something older and truer can live?'},
  {id:8,cat:'forest',e:'🫐',title:"The Elder's Medicine",w:"The elder holds medicine and poison in the same berry. Which you receive depends on how you approach it. With reverence, it heals. With entitlement, it harms.",r:'How are you approaching the difficult things in your life?'},
  {id:9,cat:'water',e:'🌊',title:'The River Does Not Worry',w:'The river does not worry about the sea. It simply flows toward what is lower, filling every hollow it finds along the way. It finds the path of least resistance and calls that path sacred.',r:'Where are you fighting the current?'},
  {id:10,cat:'water',e:'💦',title:"The Waterfall's Leap",w:"What looks like falling is sometimes the fastest path to the valley. The waterfall does not resist the cliff. It accepts the drop as part of the journey. The roar and the mist are arrival.",r:'What cliff edge have you been standing at?'},
  {id:11,cat:'water',e:'🪞',title:'The Still Pool Reflects',w:'Only still water shows the true face of the sky. You cannot see clearly while moving. A still pool holds both what is above and what is below in the same moment.',r:'When did you last be truly still? What reflected in the quiet?'},
  {id:12,cat:'water',e:'🌧️',title:'The Rain Does Not Choose',w:'The rain does not decide who is worthy of nourishment. In this, it teaches grace — inspiration and care are unconditional. The land does not earn the rain.',r:'Where are you withholding your gifts, waiting for someone to deserve them?'},
  {id:13,cat:'mountain',e:'🏔️',title:'The Mountain Waits',w:'The mountain does not go to the valley. It waits. All rivers, all weather, all journeys come to it eventually. To be the one others travel toward is a kind of power held for a million years.',r:'What would it mean to become the kind of stillness others travel toward?'},
  {id:14,cat:'mountain',e:'🪨',title:'The Stone Remembers',w:'A stone remembers everything that has touched it — rain, fire, the hands of the long dead. It does not distinguish between important and incidental contact. All touch leaves its trace.',r:'What memory lives in your body that your mind released long ago?'},
  {id:15,cat:'mountain',e:'⛰️',title:'The View from High Ground',w:'From the mountain, the forest appears as a single breathing creature. From inside it, you can barely see ten feet ahead. Both perspectives are true — you need both.',r:'What have you lost sight of by being too close?'},
  {id:16,cat:'mountain',e:'🕳️',title:"The Cave's Invitation",w:"The cave was the first sacred space — dark, deep, holding the oldest art, the oldest fires, the oldest prayers. Going in is not hiding. Going in is return.",r:'What inner darkness are you being invited to enter?'},
  {id:17,cat:'earth',e:'🌱',title:'The Moss Persists',w:'Moss grows where nothing else will — in the crack of stone, on the shade side, in the place after fire. It needs almost nothing. It grows a fraction of a millimeter and calls that forward.',r:'Where is something fragile and persistent trying to grow in your life?'},
  {id:18,cat:'earth',e:'🍄',title:'The Root Web',w:'The roots of the old forest are woven together underground, sharing water through the fungal web. You are part of a network of invisible care that holds you whether you feel it or not.',r:'Who are you feeding quietly, without credit? Who is quietly feeding you?'},
  {id:19,cat:'earth',e:'🌾',title:'Decay Is Generous',w:'The rotting log is not death — it is a city. More life lives in a cubic inch of healthy soil than in all the visible forest above it. What appears to be ending is becoming something richer.',r:'What in your life appears to be dying but is actually composting into something essential?'},
  {id:20,cat:'earth',e:'🌰',title:"The Seed's Memory",w:"The seed holds the memory of the tree. It does not need to understand this to fulfill it. Some knowledge lives in the body — it does not travel through the thinking mind.",r:'What gift or wound is asking to be tended rather than transcended?'},
  {id:21,cat:'wind',e:'✨',title:'Awen Arrives',w:'Awen comes on the breath — it cannot be summoned by will alone. It arrives when you make yourself receptive, when you stop trying to be the source and allow yourself to be the channel.',r:'When did inspiration last find you? What were the conditions that let it in?'},
  {id:22,cat:'wind',e:'🍃',title:'The Wind Carries Seeds',w:'The wind carries seeds from trees it will never see again. In giving them away, it spreads the forest across centuries. It is generous in the way that costs nothing and changes everything.',r:'What are you meant to scatter?'},
  {id:23,cat:'wind',e:'🫁',title:'The Breath Exchange',w:'Every breath is borrowed. You are breathing the same molecules as your ancestors, as the ancient forests, as the stars in formation. You are always in the middle of an exchange you did not begin.',r:'What are you breathing in right now?'},
  {id:24,cat:'wind',e:'⛈️',title:"The Storm's Gift",w:"The storm does not apologize for its nature. In clearing the old and the dead, it prepares the ground for what is coming. Trees that survive learned to bend.",r:'What storm in your past cleared the ground for something essential in you?'},
  {id:25,cat:'spirit',e:'🦌',title:'The Deer at the Edge',w:'The deer lives at the threshold — between the forest and the field, between the seen and the unseen. Grace is not timidity. It is perfect readiness.',r:'Where are you being called to live at the threshold?'},
  {id:26,cat:'spirit',e:'🐦',title:"The Raven's Message",w:"The raven carries messages between worlds. Not all communication is spoken — some is felt, dreamed, found in the sudden appearance of a bird at the right moment.",r:'What message are you receiving but refusing to pass on?'},
  {id:27,cat:'spirit',e:'🐟',title:'The Salmon Returns',w:'The salmon returns to the waters of its birth to give everything it has so the next generation can begin. It does not return because the journey is easy.',r:'What is asking you to return to your source?'},
  {id:28,cat:'spirit',e:'🦢',title:"The Heron's Patience",w:"The heron waits at the edge of the water for as long as it takes. It does not rush the fish. It knows with its whole body that the fish will come.",r:'Where are you rushing what requires patience?'},
];

/* ── Audio ── */
function useAmbience(){
  const s=useRef({ctx:null,master:null,active:false});
  const[playing,setPlaying]=useState(false);
  const stop=useCallback(()=>{
    s.current.active=false;
    if(s.current.master&&s.current.ctx){try{s.current.master.gain.linearRampToValueAtTime(.001,s.current.ctx.currentTime+2.5);}catch(e){}}
    setTimeout(()=>{try{if(s.current.ctx)s.current.ctx.close();}catch(e){};s.current={ctx:null,master:null,active:false};setPlaying(false);},2800);
  },[]);
  const start=useCallback(()=>{
    if(s.current.ctx)return;
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const master=ctx.createGain();master.gain.setValueAtTime(.001,ctx.currentTime);master.gain.linearRampToValueAtTime(.5,ctx.currentTime+5);master.connect(ctx.destination);
      s.current={ctx,master,active:true};
      const rl=ctx.sampleRate*5,rb=ctx.createBuffer(2,rl,ctx.sampleRate);
      for(let c=0;c<2;c++){const d=rb.getChannelData(c);for(let i=0;i<rl;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/rl,2.2);}
      const rev=ctx.createConvolver();rev.buffer=rb;
      const rg=ctx.createGain();rg.gain.value=.52;rev.connect(rg);rg.connect(master);
      const dry=ctx.createGain();dry.gain.value=.48;dry.connect(master);
      const mix=n=>{n.connect(rev);n.connect(dry);};
      [[54.5,.28],[81.7,.16],[109,.09],[163.4,.05]].forEach(([f,a],i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f+(Math.random()-.5)*.8;g.gain.value=a*.15;o.connect(g);mix(g);o.start();
        const lfo=ctx.createOscillator(),lg=ctx.createGain();lfo.frequency.value=.022+i*.016;lg.gain.value=f*.004;lfo.connect(lg);lg.connect(o.frequency);lfo.start();
      });
      const nb=ctx.createBuffer(1,ctx.sampleRate*4,ctx.sampleRate);const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
      const ns=ctx.createBufferSource();ns.buffer=nb;ns.loop=true;
      const nf=ctx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=370;nf.Q.value=.6;
      const ng=ctx.createGain();ng.gain.value=.065;ns.connect(nf);nf.connect(ng);mix(ng);ns.start();
      const penta=[261.63,329.63,392,523.25,587.33,659.25,783.99,880];
      const chime=()=>{
        if(!s.current.active||!s.current.ctx)return;
        const t=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=penta[Math.floor(Math.random()*penta.length)];
        g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(.12,t+.06);g.gain.exponentialRampToValueAtTime(.001,t+5);
        o.connect(g);mix(g);o.start(t);o.stop(t+6);
        if(s.current.active)setTimeout(chime,5000+Math.random()*14000);
      };
      setTimeout(chime,3500);setPlaying(true);
    }catch(e){console.warn('Audio:',e);}
  },[]);
  const toggle=useCallback(()=>playing?stop():start(),[playing,stop,start]);
  useEffect(()=>()=>{s.current.active=false;try{if(s.current.ctx)s.current.ctx.close();}catch(e){}},[]);
  return{playing,toggle};
}

                  <p style={{fontSize:9,color:cat.accent,letterSpacing:2,textTransform:'uppercase',marginBottom:5}}>Reflection</p>
                  <p style={{fontStyle:'italic',color:'rgba(200,176,120,.52)',fontSize:12,lineHeight:1.7}}>"{current.r}"</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <button className="dc-btn" onClick={drawAnother} style={{marginTop:16,padding:'10px 24px',background:'linear-gradient(135deg,#3a2408,#6a4010)',border:'1px solid #d4a820',borderRadius:4,color:'#f0c830',fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:4,textTransform:'uppercase'}}>✦ Draw Another</button>
      </div>
      <Divider/>
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
        {['all',...OCATS.map(c=>c.key)].map(k=>{const cfg=k==='all'?{e:'✦',label:'All',accent:'#d4a820'}:OCATS.find(c=>c.key===k);return(
          <button key={k} className="dc-btn" onClick={()=>setCatFilter(k)} style={{padding:'4px 11px',borderRadius:20,fontSize:10,letterSpacing:1,fontFamily:"'Cinzel',serif",border:'1px solid',cursor:'pointer',background:catFilter===k?'rgba(212,168,32,.18)':'rgba(8,18,6,.8)',borderColor:catFilter===k?'#d4a820':'rgba(58,88,48,.3)',color:catFilter===k?'#f0c830':'rgba(200,176,120,.52)'}}>
            {cfg.e} {k==='all'?'All':cfg.label}
          </button>
        );})}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(195px,1fr))',gap:9}}>
        {browsed.map(card=>{const cc=OCATS.find(c=>c.key===card.cat)||OCATS[0];const open=expanded===card.id;return(
          <div key={card.id} className="dc-card" onClick={()=>setExpanded(open?null:card.id)} style={{borderRadius:8,background:cc.bg,border:`1px solid ${cc.accent}28`,cursor:'pointer',overflow:'hidden'}}>
            {!open&&<div style={{height:80,overflow:'hidden',position:'relative'}}><img src={cc.img} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/><div style={{position:'absolute',inset:0,background:`${cc.bg}bb`}}/></div>}
            <div style={{padding:'10px 13px'}}>
              <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:open?8:0}}>
                <span style={{fontSize:18}}>{card.e}</span>
                <p style={{fontFamily:"'Cinzel',serif",color:'#f0ddb0',fontSize:12,flex:1,lineHeight:1.3}}>{card.title}</p>
                <span style={{color:cc.accent,fontSize:12,transition:'transform .3s',transform:open?'rotate(180deg)':''}}>▾</span>
              </div>
              {open&&<><p style={{fontSize:12,fontStyle:'italic',color:'rgba(200,176,120,.68)',lineHeight:1.75,marginBottom:8}}>{card.w}</p><p style={{fontSize:11,color:cc.accent,lineHeight:1.65,fontStyle:'italic'}}>"{card.r}"</p></>}
            </div>
          </div>
        );})}
      </div>
    </div>
  );
}

/* ── Archive ── */
function Archive(){
  const[filter,setFilter]=useState('all');
  const[search,setSearch]=useState('');
  const items=ARCHIVE.filter(a=>(filter==='all'||a.type===filter)&&(!search||a.title.toLowerCase().includes(search.toLowerCase())||a.author.toLowerCase().includes(search.toLowerCase())));
  return(
    <div className="dc-in">
      <PhotoBanner url={P.roots} h={150} overlay={.52}>
        <h2 style={{fontFamily:"'Cinzel Decorative',serif",color:'#f0c830',fontSize:'clamp(17px,3vw,24px)'}}>The Archive</h2>
        <p style={{fontStyle:'italic',color:'rgba(200,176,120,.52)',fontSize:13,marginTop:3}}>Writings, bardic arts, music, and workshops of the community</p>
      </PhotoBanner>
      <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search the archive…" style={{width:'100%',padding:'9px 14px',borderRadius:4,fontSize:14,marginBottom:11}}/>
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:18}}>
        {['all',...Object.keys(TYCFG)].map(t=>(
          <button key={t} className="dc-btn" onClick={()=>setFilter(t)} style={{padding:'4px 11px',borderRadius:20,fontSize:10,letterSpacing:1,fontFamily:"'Cinzel',serif",border:'1px solid',cursor:'pointer',background:filter===t?'rgba(212,168,32,.18)':'rgba(8,18,6,.8)',borderColor:filter===t?'#d4a820':'rgba(58,88,48,.3)',color:filter===t?'#f0c830':'rgba(200,176,120,.52)'}}>
            {t==='all'?'✦ All':`${TYCFG[t].i} ${TYCFG[t].l}`}
          </button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12}}>
        {items.map(item=>{const cfg=TYCFG[item.type]||TYCFG.writing;return(
          <div key={item.id} className="dc-card" style={{borderRadius:6,background:'rgba(7,14,6,.88)',border:'1px solid rgba(58,88,48,.28)',overflow:'hidden'}}>
            <div className="ph-zoom" style={{height:130,position:'relative'}}>
              <img src={item.img} alt="" style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}}/>
              <div style={{position:'absolute',inset:0,background:'rgba(5,12,5,.45)'}}/>
              <span style={{position:'absolute',top:10,right:10,fontSize:10,color:cfg.c,background:'rgba(4,10,4,.75)',padding:'2px 8px',borderRadius:20}}>{cfg.i} {cfg.l}</span>
            </div>
            <div style={{padding:'14px 16px'}}>
              <h3 style={{fontFamily:"'Cinzel',serif",color:'#f0ddb0',fontSize:13,marginBottom:5,lineHeight:1.3}}>{item.title}</h3>
              <p style={{fontSize:12,fontStyle:'italic',color:'rgba(200,176,120,.5)',lineHeight:1.65,marginBottom:10}}>{item.ex}</p>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'rgba(180,150,100,.36)'}}><span>{item.author}</span><span>{item.date}</span></div>
            </div>
          </div>
        );})}
      </div>
    </div>
  );
}

/* ── Journal (uses localStorage) ── */
function Journal({user}){
  const[entries,setEntries]=useState([]);
  const[composing,setComposing]=useState(false);
  const[viewing,setViewing]=useState(null);
  const[draft,setDraft]=useState({title:'',body:'',mood:MOODS[0]});
  const[loading,setLoading]=useState(true);
  const moon=moonInfo(getMoonPhase());
  useEffect(()=>{try{const r=store.get(`tw_j_${user}`);if(r)setEntries(JSON.parse(r.value));}catch(e){};setLoading(false);},[user]);
  const seal=useCallback(()=>{
    if(!draft.body.trim())return;
    const e={id:Date.now(),title:draft.title||'Untitled Entry',body:draft.body,mood:draft.mood,moon:`${moon.e} ${moon.n}`,date:new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})};
    const upd=[e,...entries];setEntries(upd);store.set(`tw_j_${user}`,JSON.stringify(upd));
    setDraft({title:'',body:'',mood:MOODS[0]});setComposing(false);
  },[draft,entries,user,moon]);
  const release=useCallback(id=>{const upd=entries.filter(e=>e.id!==id);setEntries(upd);store.set(`tw_j_${user}`,JSON.stringify(upd));if(viewing&&viewing.id===id)setViewing(null);},[entries,user,viewing]);
  if(loading)return<div style={{padding:40,textAlign:'center',fontStyle:'italic',color:'rgba(200,176,120,.32)'}}>Opening the journal…</div>;
  if(viewing)return(
    <div className="dc-in">
      <button className="dc-btn" onClick={()=>setViewing(null)} style={{background:'none',border:'none',color:'#d4a820',fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:2,marginBottom:20,padding:0}}>← Return</button>
      <p style={{fontSize:10,color:'rgba(200,176,120,.36)',marginBottom:4}}>{viewing.date} · {viewing.moon} · {viewing.mood}</p>
      <h2 style={{fontFamily:"'Cinzel Decorative',serif",color:'#f0c830',fontSize:20,marginBottom:18}}>{viewing.title}</h2>
      <Divider/>
      <p style={{lineHeight:1.95,fontStyle:'italic',fontSize:16,color:'#f0ddb0',whiteSpace:'pre-wrap',marginBottom:28}}>{viewing.body}</p>
      <Divider/>
      <button className="dc-btn" onClick={()=>release(viewing.id)} style={{background:'rgba(70,10,10,.4)',border:'1px solid rgba(120,25,25,.38)',color:'rgba(200,100,100,.52)',padding:'7px 15px',borderRadius:4,fontSize:11,fontFamily:"'Cinzel',serif",letterSpacing:2}}>Release This Entry</button>
    </div>
  );
  if(composing)return(
    <div className="dc-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <h2 style={{fontFamily:"'Cinzel Decorative',serif",color:'#f0c830',fontSize:'clamp(15px,3vw,21px)'}}>New Entry</h2>
        <button className="dc-btn" onClick={()=>setComposing(false)} style={{background:'none',border:'1px solid rgba(138,104,32,.28)',color:'rgba(200,176,120,.42)',padding:'5px 11px',borderRadius:4,fontSize:11,fontFamily:"'Cinzel',serif"}}>✕</button>
      </div>
      <input type="text" value={draft.title} onChange={e=>setDraft(d=>({...d,title:e.target.value}))} placeholder="Give this moment a name…" style={{width:'100%',padding:'10px 14px',borderRadius:4,fontSize:17,marginBottom:11}}/>
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:13}}>
        {MOODS.map(m=><button key={m} className="dc-btn" onClick={()=>setDraft(d=>({...d,mood:m}))} style={{padding:'3px 9px',borderRadius:20,fontSize:10,border:'1px solid',cursor:'pointer',background:draft.mood===m?'rgba(212,168,32,.17)':'rgba(8,18,6,.8)',borderColor:draft.mood===m?'#d4a820':'rgba(58,88,48,.3)',color:draft.mood===m?'#f0c830':'rgba(200,176,120,.48)'}}>{m}</button>)}
      </div>
      <textarea value={draft.body} onChange={e=>setDraft(d=>({...d,body:e.target.value}))} placeholder="What arose in you today? What did the land speak?…" style={{width:'100%',minHeight:270,padding:'13px 16px',borderRadius:4,fontSize:15,lineHeight:1.9,resize:'vertical'}}/>
      <button className="dc-btn" onClick={seal} style={{width:'100%',padding:'12px 0',marginTop:13,background:'linear-gradient(135deg,#3a2408,#6a4010)',border:'1px solid #d4a820',borderRadius:4,color:'#f0c830',fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:4,textTransform:'uppercase'}}>Seal the Entry</button>
    </div>
  );
  return(
    <div className="dc-in">
      <PhotoBanner url={P.fogforest} h={140} overlay={.55}>
        <h2 style={{fontFamily:"'Cinzel Decorative',serif",color:'#f0c830',fontSize:'clamp(17px,3vw,23px)'}}>My Journal</h2>
        <p style={{fontStyle:'italic',color:'rgba(200,176,120,.5)',fontSize:13,marginTop:3}}>Private · Saved in your browser</p>
      </PhotoBanner>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
        <button className="dc-btn" onClick={()=>setComposing(true)} style={{padding:'9px 18px',background:'linear-gradient(135deg,#3a2408,#6a4010)',border:'1px solid #d4a820',borderRadius:4,color:'#f0c830',fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:3,textTransform:'uppercase'}}>✦ New Entry</button>
      </div>
      {!entries.length?(
        <div style={{textAlign:'center',padding:'50px 20px',border:'1px dashed rgba(138,104,32,.17)',borderRadius:8}}>
          <p style={{fontSize:34,marginBottom:12}}>📖</p>
          <p style={{fontStyle:'italic',color:'rgba(200,176,120,.32)',fontSize:16}}>The pages await your voice</p>
        </div>
      ):(
        <div style={{display:'grid',gap:9}}>
          {entries.map(e=>(
            <div key={e.id} className="dc-card" onClick={()=>setViewing(e)} style={{padding:'15px 17px',borderRadius:6,background:'rgba(7,14,6,.85)',border:'1px solid rgba(58,88,48,.28)',cursor:'pointer'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
                <div style={{flex:1}}>
                  <p style={{fontSize:9,color:'rgba(200,176,120,.35)',marginBottom:3}}>{e.date} · {e.moon} · {e.mood}</p>
                  <h3 style={{fontFamily:"'Cinzel',serif",color:'#f0ddb0',fontSize:14,marginBottom:4}}>{e.title}</h3>
                  <p style={{fontSize:12,fontStyle:'italic',color:'rgba(200,176,120,.46)',lineHeight:1.6}}>{e.body.slice(0,100)}{e.body.length>100?'…':''}</p>
                </div>
                <span style={{fontSize:16,opacity:.28}}>→</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Bardic ── */
function Bardic(){
  const pieces=[
    {type:'poem',title:'Before the Snowdrop',author:'S. Merrill',date:'Feb 2026',img:P.ferns,body:`Before the snowdrop dares,\nbefore the ground admits\nit ever knew warmth —\nsomething stirs.\n\nNot hope. Older than hope.\nThe memory of green.\n\nThe birch knows this.\nIt is always first.\nIt does not wait for permission.`},
    {type:'story',title:'What Happened at the Threshold',author:'Community',date:'Nov 2025',img:P.path,body:`There was a moment before the rite began when we all stood at the edge of the cleared ground and no one spoke. The trees around us were listening in the way trees do — not passively, but as witnesses to something they had seen before.\n\nThe fire had not yet been lit. Something in that pause told us: what we step into now will change us in ways we cannot yet name.`},
    {type:'poem',title:'Three Stones',author:'K. Ashwood',date:'Dec 2025',img:P.stones,body:`I set three stones upon the cloth.\nI did not choose them carefully —\nthey chose me from the riverbed.\n\nThey know the names\nI have only heard in dreams.\n\nI do not clean them.\nDirt is how the dead\nremember they were alive.`},
  ];
  return(
    <div className="dc-in">
      <PhotoBanner url={P.dawn} h={150} overlay={.45}>
        <h2 style={{fontFamily:"'Cinzel Decorative',serif",color:'#f0c830',fontSize:'clamp(17px,3vw,24px)'}}>The Bardic Circle</h2>
        <p style={{fontStyle:'italic',color:'rgba(200,176,120,.52)',fontSize:13,marginTop:3}}>Poetry, story, song, and myth — the oral tradition kept living</p>
      </PhotoBanner>
      <Divider/>
      {pieces.map((p,i)=>(
        <div key={i} style={{marginBottom:32}}>
          <div style={{borderRadius:6,overflow:'hidden',marginBottom:14,position:'relative',height:120}}>
            <img src={p.img} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            <div style={{position:'absolute',inset:0,background:'rgba(5,12,5,.6)'}}/>
            <div style={{position:'absolute',inset:0,padding:'14px 18px',display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:3,color:'rgba(160,130,200,.55)',textTransform:'uppercase',marginBottom:3}}>{p.type}</span>
              <h3 style={{fontFamily:"'Cinzel Decorative',serif",color:'#d4a820',fontSize:17}}>{p.title}</h3>
            </div>
          </div>
          <div style={{padding:'16px 22px',borderLeft:'2px solid rgba(212,168,32,.25)',background:'rgba(10,5,22,.38)',borderRadius:'0 6px 6px 0',marginBottom:9}}>
            <p style={{fontStyle:'italic',fontSize:15,lineHeight:2.15,color:'#f0ddb0',whiteSpace:'pre-wrap'}}>{p.body}</p>
          </div>
          <p style={{fontSize:11,color:'rgba(200,176,120,.3)',textAlign:'right'}}>— {p.author}, {p.date}</p>
          {i<pieces.length-1&&<Divider dim/>}
        </div>
      ))}
    </div>
  );
}

/* ── App Shell ── */
function App({user,onLogout}){
  const[page,setPage]=useState('grove');
  const{playing,toggle}=useAmbience();
  const moon=moonInfo(getMoonPhase());
  const PAGES={grove:<Grove user={user} goTo={setPage}/>,gallery:<Gallery/>,oracle:<Oracle/>,archive:<Archive/>,journal:<Journal user={user}/>,bardic:<Bardic/>};
  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <div style={{width:215,minHeight:'100vh',flexShrink:0,background:'rgba(3,8,3,.96)',backdropFilter:'blur(20px)',borderRight:'1px solid rgba(58,88,48,.24)',display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh',zIndex:10}}>
        <div style={{position:'relative',overflow:'hidden',borderBottom:'1px solid rgba(58,88,48,.18)'}}>
          <img src={P.bark} alt="" style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',opacity:.18}}/>
          <div style={{position:'relative',padding:'22px 16px 16px',textAlign:'center'}}>
            <div className="dc-float" style={{fontSize:34,filter:'drop-shadow(0 0 12px rgba(212,168,32,.55))'}}>🌳</div>
            <p style={{fontFamily:"'Cinzel Decorative',serif",color:'#f0c830',fontSize:12,letterSpacing:1,lineHeight:1.3,marginTop:7}}>The Thornwood</p>
            <p style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:4,color:'rgba(200,176,120,.35)',textTransform:'uppercase',marginTop:2}}>Ancient paths. Living community.</p>
          </div>
        </div>
        <div style={{padding:'10px 16px',borderBottom:'1px solid rgba(58,88,48,.13)',background:'rgba(12,12,40,.28)',textAlign:'center'}}>
          <span style={{fontSize:20,display:'block',marginBottom:3,animation:'mng 4s ease-in-out infinite'}}>{moon.e}</span>
          <p style={{fontFamily:"'Cinzel',serif",color:'rgba(160,190,230,.55)',fontSize:9,letterSpacing:1}}>{moon.n}</p>
        </div>
        <nav style={{flex:1,padding:'10px 0'}}>
          {NAV.map(n=>(
            <div key={n.k} className={`dc-nav${page===n.k?' active':''}`} onClick={()=>setPage(n.k)} style={{display:'flex',alignItems:'center',gap:9,padding:'10px 16px',fontSize:12,color:'rgba(200,176,120,.5)',borderLeft:'3px solid transparent'}}>
              <span style={{fontSize:14}}>{n.e}</span>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1}}>{n.l}</span>
            </div>
          ))}
        </nav>
        <div style={{padding:'8px 12px',borderTop:'1px solid rgba(58,88,48,.13)'}}>
          <button className="dc-btn" onClick={toggle} style={{width:'100%',padding:'7px 8px',background:playing?'rgba(58,88,48,.38)':'rgba(8,18,8,.55)',border:`1px solid ${playing?'rgba(74,122,64,.55)':'rgba(58,88,48,.24)'}`,borderRadius:4,color:playing?'#4a9a5a':'rgba(200,176,120,.3)',fontSize:10,fontFamily:"'Cinzel',serif",letterSpacing:2,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
            <span>{playing?'🔊':'🔇'}</span><span>{playing?'Grove Sound':'Sound Off'}</span>
          </button>
        </div>
        <div style={{padding:'9px 16px 14px',borderTop:'1px solid rgba(58,88,48,.16)'}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}>
            <span style={{fontSize:12}}>🌿</span>
            <span style={{fontSize:11,color:'rgba(200,176,120,.42)',fontStyle:'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user}</span>
          </div>
          <button className="dc-btn" onClick={onLogout} style={{width:'100%',padding:'6px 0',background:'none',border:'1px solid rgba(58,88,48,.24)',borderRadius:4,color:'rgba(200,176,120,.28)',fontSize:9,fontFamily:"'Cinzel',serif",letterSpacing:2}}>Leave Grove</button>
        </div>
      </div>
      <main style={{flex:1,padding:'clamp(16px,4vw,44px)',maxWidth:920,overflow:'auto'}}>
        {PAGES[page]}
      </main>
    </div>
  );
}

/* ── Root ── */
function ThornwoodApp(){
  const[user,setUser]=useState(null);
  return(
    <>
      <StarField/><MistLayer/><Fireflies/>
      <div style={{position:'relative',zIndex:3}}>
        {user?<App user={user} onLogout={()=>setUser(null)}/>:<Login onLogin={setUser}/>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ThornwoodApp/>);
</script>
